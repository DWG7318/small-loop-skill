interface:
  display_name: "Small Loop Skill (SLK)"
  short_description: "One Supervisor/Checker with one Worker"
  default_prompt: "Use only $small-loop-skill (SLK), exactly once. Never load, borrow, combine, or switch to MSLK. Use exactly one visible combined Supervisor/Checker and one visible Worker, never subagents or a separate Checker. Supervisor responsibility owns planning, GO revision, Worker-result repair, and any Owner-configured optional Goal gate; Checker responsibility inside the same combined role owns validation and routing. Use gpt-5.6-sol xhigh for the combined role and gpt-5.5 high through gpt-5.6-sol high for the Worker by task type. Size GO by project need and CELL by computer capacity. Show accepted/total project CELL progress on every task. When a Goal exists, completion requires Supervisor evidence for GOAL_SATISFIED; GOAL_GAP creates a simulated PLAN/GO/CELL continuation. Simulate before formal work and every GO revision."
