interface:
  display_name: "Small Loop Skill (SLK)"
  short_description: "One Supervisor/Checker with one Worker"
  default_prompt: "Use only $small-loop-skill (SLK), exactly once. Never load, borrow, combine, or switch to MSLK. Use exactly one visible combined Supervisor/Checker and one visible Worker, never subagents or a separate Checker. Supervisor responsibility owns planning, GO revision, Worker-result repair, optional Goal validation, and continuation-condition resolution; Checker responsibility inside the same combined role owns validation, routing, stopping unsafe dispatch, and prerequisite revalidation. Use gpt-5.6-sol xhigh for the combined role and gpt-5.5 high through gpt-5.6-sol high for the Worker by task type. Size GO by project need and CELL by computer capacity. Show accepted/total progress on every task. CONDITION_BLOCKED stops dispatch; Supervisor either requests Owner assistance or records SUPERVISOR_RESOLVED and RESUME_AUTHORIZED before Checker revalidation. A configured Goal requires GOAL_SATISFIED."
