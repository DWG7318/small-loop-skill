interface:
  display_name: "Small Loop Skill (SLK)"
  short_description: "One Supervisor/Checker with one Worker"
  default_prompt: "Use only $small-loop-skill (SLK), exactly once. Never load, borrow, combine, or switch to MSLK. Use exactly one visible combined Supervisor/Checker and one visible Worker, never subagents or a separate Checker. Supervisor responsibility owns planning, repair, optional Goal validation, continuation-condition resolution, and any Owner-configured Overseer start/resume/pause schedule; Checker responsibility owns validation, routing, stopping unsafe dispatch, and prerequisite revalidation. The combined role uses gpt-5.6-sol xhigh; the Worker uses gpt-5.5 high through gpt-5.6-sol high by task type. Size GO by project need and CELL by computer capacity. Show accepted/total progress on every task. CONDITION_BLOCKED stops dispatch. Scheduled pause waits for a safe CELL boundary; scheduled resume reuses the same invocation and Worker only after the continuation-condition gate. A configured Goal requires GOAL_SATISFIED."
