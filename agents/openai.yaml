interface:
  display_name: "Small Loop Skill (SLK)"
  short_description: "One Supervisor/Checker with one Worker"
  default_prompt: "Use only $small-loop-skill (SLK), exactly once. Never load, borrow, combine, or switch to MSLK. Use exactly one visible combined Supervisor/Checker and one visible Worker, never subagents or a separate Checker. Before simulation, every exact-roster role must pass the independent SLK readiness Eval with exactly 25/25; then require SIMULATION_PASS before manual SLK START or any formal CELL. Supervisor responsibility owns planning, repair, capability provisioning, optional Goal validation, continuation-condition resolution, and Owner-configured safe pause/same-Worker resume; Checker responsibility owns the evolving detection system, independent validation, routing, unsafe-dispatch stops, and prerequisite revalidation. Record DETECTION_CAPABILITY_MANIFEST and assign GO_DETECTION_PROFILE; Checker responsibility executes its complete bundle for every CELL and writes CELL_DETECTION_RECEIPT. Every governed Markdown file has a hard 1000-line limit and WORK_CONTINUATION_INDEX is a current-state pointer below 200 lines. For code/repository work require CodeGraph plus GO-selected mature checks. Missing capability is CONDITION_BLOCKED. The combined role uses gpt-5.6-sol xhigh; the Worker uses gpt-5.5 high through gpt-5.6-sol high. Show accepted/total progress. Every Worker assignment is the combined role's final action; it then goes offline without polling and wakes only for formal Worker completion, blocker, or execution-failure signals. Initial start is manual only, pause uses a safe CELL boundary, resume reuses the same Worker, and a configured Goal requires GOAL_SATISFIED."
