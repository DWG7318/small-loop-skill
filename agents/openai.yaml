interface:
  display_name: "Small Loop Skill (SLK)"
  short_description: "One Supervisor/Checker with one Worker"
  default_prompt: "Use only $small-loop-skill (SLK), exactly once. Never load, borrow, combine, or switch to MSLK. Use exactly one visible combined Supervisor/Checker and one visible Worker, never subagents or a separate Checker. Supervisor responsibility owns planning, repair, capability provisioning, optional Goal validation, continuation-condition resolution, and any Owner-configured Overseer schedule; Checker responsibility owns the evolving detection system, independent validation, routing, unsafe-dispatch stops, and prerequisite revalidation. For code/repository work require CodeGraph plus a risk-selected layered stack of native checks, Semgrep/CodeQL, Gitleaks, OSV-Scanner/Trivy, Playwright, coverage/mutation, and API/schema tools. Record DETECTION_CAPABILITY_MANIFEST and REGRESSION_EVIDENCE; missing required capability is CONDITION_BLOCKED. The combined role uses gpt-5.6-sol xhigh; the Worker uses gpt-5.5 high through gpt-5.6-sol high by task type. Size GO by project need and CELL by computer capacity. Show accepted/total progress on every task. Scheduled pause waits for a safe CELL boundary; resume reuses the same invocation and Worker. A configured Goal requires GOAL_SATISFIED."
