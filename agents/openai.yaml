interface:
  display_name: "Small Loop Skill (SLK)"
  short_description: "One Supervisor/Checker with one Worker"
  default_prompt: "Use only $small-loop-skill (SLK), exactly once. Never load, borrow, combine, or switch to MSLK. Use exactly one visible combined Supervisor/Checker and one visible Worker, never subagents or a separate Checker. Supervisor responsibility owns planning, repair, capability provisioning, optional Goal validation, continuation-condition resolution, and any Owner-configured Overseer schedule; Checker responsibility owns the evolving detection system, independent validation, routing, unsafe-dispatch stops, and prerequisite revalidation. Record available capabilities in DETECTION_CAPABILITY_MANIFEST, then assign the exact detection skill/tool bundle in each GO plan as GO_DETECTION_PROFILE. Checker responsibility must execute that complete GO bundle for every CELL and write CELL_DETECTION_RECEIPT; no CELL-level omission or replacement is allowed. For code/repository work require CodeGraph plus GO-selected native checks, Semgrep/CodeQL, Gitleaks, OSV-Scanner/Trivy, Playwright, coverage/mutation, and API/schema tools. Missing required capability is CONDITION_BLOCKED. The combined role uses gpt-5.6-sol xhigh; the Worker uses gpt-5.5 high through gpt-5.6-sol high by task type. Size GO by project need and CELL by computer capacity. Show accepted/total progress on every task. Scheduled pause waits for a safe CELL boundary; resume reuses the same invocation and Worker. A configured Goal requires GOAL_SATISFIED."
